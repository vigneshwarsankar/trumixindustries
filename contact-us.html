<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>TRUMIX Industries | Contact Us</title>
    <link
        href="https://fonts.googleapis.com/css?family=Roboto:100,100i,300,300i,400,400i,500,500i,700,700i,900,900i&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css?family=Raleway:100,100i,200,200i,300,300i,400,400i,500,500i,600,600i,700,700i,800,800i,900,900i&amp;display=swap"
        rel="stylesheet">
    <link rel="stylesheet" id="bootstrap-css" href="css/bootstrap.css" type="text/css" media="all">
    <link rel="stylesheet" id="awesome-font-css" href="css/font-awesome.css" type="text/css" media="all">
    <link rel="stylesheet" id="ionicon-font-css" href="css/ionicon.css" type="text/css" media="all">
    <link rel="stylesheet" id="slick-slider-css" href="css/slick.css" type="text/css" media="all">
    <link rel="stylesheet" id="slick-theme-css" href="css/slick-theme.css" type="text/css" media="all">
    <link rel="stylesheet" id="magnific-popup-css" href="css/magnific-popup.css" type="text/css" media="all">
    <link rel="stylesheet" id="industris-style-css" href="style.css" type="text/css" media="all">

    <link rel="shortcut icon" href="favicon.png">
</head>

<body>
    <div id="page" class="site">
        <div id="header-placeholder"></div>

        <div id="content" class="site-content">
            <div class="page-header" style="background: url('images/subheader-contact.jpg') no-repeat center center;">
                <div class="container">
                    <div class="breadc-box no-line">
                        <div class="row">
                            <div class="col-md-12">
                                <h2 class="page-title">Contact Us</h2>
                                <ul id="breadcrumbs" class="breadcrumbs none-style">
                                    <li><a href="index.html">Home</a></li>
                                    <li class="active">Contact Us</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <section class="bg-contact-info">
                <div class="container">
                    <div class="row">
                        <div class="col-md-6 col-sm-12">
                            <h4 class="text-primary">CONTACT INFO</h4>
                            <div class="contact-info">
                                <h3>Contact Us : <span class="text-danger">+919342218345</span> </h3>
                                <p><i class="icon ion-md-mail"></i> trumixindustries@gmail.com</p>
                                <p><i class="icon ion-md-pin"></i> Chennai, Tamil Nadu, India</p>
                            </div>
                            <div class="space-industris"></div>
                            <hr>
                        </div>
                        <div class="col-md-12">
                            <form class="form-contact" action="#" method="post">
                                <h3>Contact form</h3>
                                <div class="row">
                                    <div class="col-md-4 form-group">
                                        <input type="text" name="name" id="name" class="form-control"
                                            placeholder="Your name" required>
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <input type="text" name="phone" id="phone" class="form-control"
                                            placeholder="Phone number" required>
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <input type="email" name="email" id="email" class="form-control"
                                            placeholder="Email Address" required>
                                    </div>
                                    <div class="col-md-12 form-group">
                                        <textarea rows="6" name="message" id="message" class="form-control"
                                            placeholder="your message" required></textarea>
                                    </div>
                                    <div class="col-md-12">
                                        <input type="submit" value="Submit"
                                            class="wpcf7-form-control wpcf7-submit btn btn-primary">

                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <div class="container">
                    <div class="row">
                        <div class="col-md-12">
                            <h3>View map:</h3>
                            <div class="map">
                                <iframe
                                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d248755.9300184706!2d79.89683641169276!3d13.047673382084309!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a5265ea4f7d3361%3A0x6e61a70b6863d433!2z4K6a4K-G4K6p4K-N4K6p4K-ILCDgrqTgrq7grr_grrTgr40g4K6o4K6-4K6f4K-B!5e0!3m2!1sta!2sin!4v1743254645845!5m2!1sta!2sin"
                                    width="100%" height="600" frameborder="0" style="border:0;"
                                    allowfullscreen=""></iframe>
                            </div>

                        </div>
                    </div>
                </div>
            </section>

        </div>

        <div id="footer-placeholder"></div>
    </div>

    <script src='js/jquery.min.js'></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src='js/slick.min.js'></script>
    <script src='js/jquery.sticky.js'></script>
    <script src='js/countto.min.js'></script>
    <script src='js/jquery.magnific-popup.min.js'></script>
    <script src='js/jquery.isotope.min.js'></script>
    <script src='js/scripts.js'></script>
    <script src='js/include.js'></script>
</body>

</html>
